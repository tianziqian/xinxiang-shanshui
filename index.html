<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心象山水</title>
<style>
  :root{
    --paper:#f5f1e6; --paper-dim:#ece7da; --ink:#2f3734; --ink-soft:#4a5350;
    --ink-mist:#7a827c; --seal:#a63d2a; --line:#d8d2c0;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{background:var(--paper-dim);}
  body{
    font-family:"Kaiti SC","KaiTi","STKaiti","FangSong","Songti SC",serif;
    color:var(--ink); min-height:100vh; padding:28px 16px 60px;
    display:flex; flex-direction:column; align-items:center;
  }
  .wrap{width:100%; max-width:940px;}
  .paper{
    background:var(--paper); border:1px solid var(--line); border-radius:6px;
    box-shadow:0 2px 14px rgba(60,55,40,.08); overflow:hidden;
    opacity:0; transition:opacity 1.6s ease;
  }
  .paper.shown{opacity:1;}
  svg{display:block; width:100%; height:auto;}

  .panel{margin-top:22px; text-align:center; min-height:230px;}
  .fade{transition:opacity .5s ease;}
  .fade.out{opacity:0;}

  h1.title{font-size:34px; font-weight:normal; letter-spacing:.35em; text-indent:.35em; margin-bottom:10px;}
  .sub{color:var(--ink-soft); font-size:16px; letter-spacing:.12em; margin-bottom:6px;}
  .hint{color:var(--ink-mist); font-size:13px; letter-spacing:.06em; line-height:1.9; margin:14px auto; max-width:520px;}

  .crumb{color:var(--ink-mist); font-size:13px; letter-spacing:.2em; margin-bottom:8px;}
  .dim-name{font-size:20px; letter-spacing:.25em; text-indent:.25em; margin-bottom:4px;}
  .dim-note{color:var(--ink-mist); font-size:13px; letter-spacing:.08em; margin-bottom:16px;}
  .question{font-size:21px; line-height:1.9; max-width:600px; margin:0 auto 18px;}

  textarea, input[type=text]{
    font-family:inherit; font-size:16px; color:var(--ink);
    background:rgba(255,255,255,.45); border:1px solid var(--line); border-radius:4px;
    padding:12px 14px; width:100%; max-width:560px; outline:none; line-height:1.8;
  }
  textarea{min-height:96px; resize:vertical;}
  textarea:focus, input[type=text]:focus{border-color:var(--ink-mist);}
  input[type=text]{max-width:260px; text-align:center; letter-spacing:.15em;}

  .btns{margin-top:18px; display:flex; gap:14px; justify-content:center; flex-wrap:wrap;}
  button{
    font-family:inherit; font-size:15px; letter-spacing:.25em; text-indent:.25em;
    padding:9px 26px; cursor:pointer; border-radius:3px;
    border:1px solid var(--ink-soft); background:transparent; color:var(--ink-soft);
    transition:all .25s ease;
  }
  button:hover{background:var(--ink-soft); color:var(--paper);}
  button.primary{background:var(--ink); color:var(--paper); border-color:var(--ink);}
  button.primary:hover{background:var(--ink-soft);}
  button.quiet{border:none; font-size:13px; color:var(--ink-mist); letter-spacing:.1em; padding:9px 10px;}
  button.quiet:hover{background:transparent; color:var(--ink);}

  .warn{color:var(--seal); font-size:13px; letter-spacing:.1em; margin-top:10px; min-height:18px;}
  .save-note{color:var(--ink-mist); font-size:12px; margin-top:14px; letter-spacing:.1em;}

  .zhi{
    text-align:left; max-width:620px; margin:8px auto 0; font-size:16.5px; line-height:2.15;
    letter-spacing:.05em; color:var(--ink); white-space:pre-wrap;
  }
  .zhi .q-echo{color:var(--ink-mist);}
  .end-title{font-size:24px; letter-spacing:.4em; text-indent:.4em; margin-bottom:14px;}

  .dim-g{transition:opacity 2.2s ease;}
  .st0{opacity:.22;} .st1{opacity:.58;} .st2{opacity:1;}
  .detail{opacity:0; transition:opacity 2.2s ease;}
  .st1 .detail{opacity:0.7;}
  .st2 .detail{opacity:1;}
  .rich{opacity:0; transition:opacity 2.2s ease;}
  .rich.shown{opacity:1;}
  .endmark{opacity:0; transition:opacity 2.4s ease;}
  .endmark.shown{opacity:1;}
  @keyframes bloom{from{filter:blur(6px);}to{filter:blur(0);}}
  .bloom{animation:bloom 2.4s ease;}
  @keyframes drift{from{transform:translateX(-13px);}to{transform:translateX(13px);}}
  @keyframes drift2{from{transform:translateX(10px);}to{transform:translateX(-10px);}}
  .drift1{animation:drift 26s ease-in-out infinite alternate;}
  .drift2{animation:drift2 34s ease-in-out infinite alternate;}

  .chips button{font-size:14px; padding:6px 16px; letter-spacing:.1em; text-indent:.1em;}
  .vq{margin-top:16px;}
  .vq-q{color:var(--ink-soft); font-size:15px; letter-spacing:.08em; margin-bottom:2px;}
  .vq-note{display:block; color:var(--ink-mist); font-size:12.5px; letter-spacing:.06em; margin-bottom:8px;}
  button.on{background:var(--ink); color:var(--paper); border-color:var(--ink);}
  svg.placing{cursor:crosshair;}
  svg.erasing{cursor:pointer;}
  svg.erasing [data-eid]:hover, svg.erasing [data-mark]:hover{opacity:.22;}

  @keyframes cloud-l{0%{transform:translateX(-24px);}100%{transform:translateX(72px);}}
  @keyframes cloud-r{0%{transform:translateX(52px);}100%{transform:translateX(-60px);}}
  @keyframes wave{0%{transform:translateX(-12px);}100%{transform:translateX(16px);}}
  @keyframes breeze{from{transform:rotate(-2deg);}to{transform:rotate(2.6deg);}}
  @keyframes flicker{0%,100%{opacity:.4;}50%{opacity:1;}}
  @keyframes glowmoon{from{opacity:.62; transform:scale(.96);}to{opacity:1; transform:scale(1.04);}}
  @keyframes walkbob{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
  @keyframes leap{0%,58%,100%{transform:translate(0,0) rotate(0);}72%{transform:translate(7px,-20px) rotate(-16deg);}85%{transform:translate(13px,-3px) rotate(9deg);}}
  @keyframes sail{0%{transform:translate(0,0) rotate(-1deg);}50%{transform:translate(74px,-4px) rotate(1.3deg);}100%{transform:translate(150px,2px) rotate(-1deg);}}
  @keyframes cranefly{
    0%{transform:translate(0,0);opacity:0;}
    6%{opacity:1;}
    66%{transform:translate(220px,-92px);opacity:1;}
    84%{transform:translate(330px,-150px);opacity:0;}
    100%{transform:translate(0,0);opacity:0;}
  }
  @keyframes geesefly{
    0%{transform:translate(0,0);opacity:0;}
    8%{opacity:1;}
    72%{transform:translate(-240px,-78px);opacity:1;}
    88%{transform:translate(-340px,-120px);opacity:0;}
    100%{transform:translate(0,0);opacity:0;}
  }
  @keyframes birdcross{
    0%{transform:translate(0,0);opacity:0;}
    10%{opacity:1;}
    78%{transform:translate(170px,-52px);opacity:1;}
    92%{transform:translate(250px,-80px);opacity:0;}
    100%{transform:translate(0,0);opacity:0;}
  }
  @keyframes flap{0%,100%{transform:rotate(7deg);}50%{transform:rotate(-28deg);}}
  @keyframes flap2{0%,100%{transform:rotate(-5deg);}50%{transform:rotate(22deg);}}
  .alive #g-wu .drift1{animation:cloud-l 15s ease-in-out infinite alternate;}
  .alive #g-wu .drift2{animation:cloud-r 18s ease-in-out infinite alternate;}
  .alive #g-shui .v > path{transform-box:fill-box; animation:wave 8s ease-in-out infinite alternate;}
  .alive #g-shui .v > path:nth-of-type(2){animation-duration:11s; animation-delay:-3s;}
  .alive #g-shui .v > path:nth-of-type(4){animation-duration:13s; animation-delay:-6s;}
  .alive #g-zhou .v-a, .alive #g-zhou .v-b{transform-box:fill-box; transform-origin:center; animation:sail 20s ease-in-out infinite alternate;}
  .alive #g-zhou .v-c{transform-box:fill-box; animation:wave 9s ease-in-out infinite alternate;}
  .alive #g-zhou .detail circle{animation:flicker 2.6s ease-in-out infinite;}
  .alive #g-ren .detail{animation:birdcross 12s ease-in infinite;}
  .alive #g-ren .rich{animation:birdcross 12s ease-in infinite; animation-delay:-5s;}
  .alive #g-ren .v > path, .alive #g-ren .v > circle, .alive #g-ren .v > line{transform-box:fill-box; animation:walkbob 2.4s ease-in-out infinite;}
  .alive #g-ting .rich{transform-box:fill-box; transform-origin:50% 0%; animation:breeze 6s ease-in-out infinite alternate;}
  .alive .mark-he{animation:cranefly 9s ease-in infinite;}
  .alive .mark-he .wg-u{transform-box:fill-box; transform-origin:88% 100%; animation:flap .7s ease-in-out infinite;}
  .alive .mark-he .wg-d{transform-box:fill-box; transform-origin:88% 0%; animation:flap2 .7s ease-in-out infinite;}
  .alive .mark-yan{animation:geesefly 11s ease-in infinite;}
  .alive .mark-yue{transform-box:fill-box; transform-origin:center; animation:glowmoon 5s ease-in-out infinite alternate;}
  .alive .mark-yu{transform-box:fill-box; animation:leap 6s ease-in-out infinite;}
  .alive .mark-zhou2{transform-box:fill-box; transform-origin:center; animation:sail 16s ease-in-out infinite alternate;}
  .alive .mark-mei, .alive .mark-zhu, .alive .mark-song{transform-box:fill-box; transform-origin:bottom center; animation:breeze 6s ease-in-out infinite alternate;}
  @media (max-width:600px){
    h1.title{font-size:26px;}
    .question{font-size:18px;}
    body{padding:14px 8px 40px;}
    .st0{opacity:0.35;}
    svg{min-height:280px;}
    .paper{min-height:280px;}
  }
</style>

<script>

}
var DIMS = {
  jing:{name:'山径 · 方向', note:'入山先走径。正在走的路，和想走的路。'},
  wu:{name:'云雾 · 情绪', note:'半山遇雾。会来，也会散的东西。'},
  shui:{name:'水 · 能量', note:'林间听水。什么滋养你，什么耗竭你。'},
  shan:{name:'远山 · 定', note:'登高望山。画里最不动的部分。'},
  ting:{name:'亭 · 空', note:'亭中小歇。放下，与留白。'},
  ren:{name:'行人 · 身体与爆发', note:'认出走路的人。静水之下有火。'},
  zhou:{name:'舟 · 同行者', note:'下山渡水。关系与共鸣。'}
};

var Q = [
  {dim:'jing', q:'你现在走在一条什么样的路上？用你自己的话，描述一下它。'},
  {dim:'jing', q:'如果不需要向任何人证明什么，这条路，你想让它通向哪里？'},
  {dim:'wu', q:'最近一次心绪不宁，是什么时候？如果它是一种天气，它像什么？'},
  {dim:'wu', q:'如果这团雾会说话，它在替你说出内心哪一句真话？'},
  {dim:'shui', q:'这个月，哪一刻你忘了时间？'},
  {dim:'shui', q:'又是哪一刻，你只想逃走？'},
  {dim:'shan', q:'把所有身份都拿走——工作、成绩、别人的评价——剩下的你，还相信什么？'},
  {dim:'shan', q:'有什么东西，是你这些年从来没有变过的？'},
  {dim:'ting', q:'此刻，可以先放下的一件事，是什么？'},
  {dim:'ting', q:'你上一次真正的休息，是什么样子的？'},
  {dim:'ren', q:'你的身体最近想告诉你什么？'},
  {dim:'ren', q:'你身体里有一股平时不轻易示人的力量吗？它在什么时候出来过？'},
  {dim:'zhou', q:'谁在的时候，你最像你自己？'},
  {dim:'zhou', q:'你希望未来同船的人，身上有什么？'}
];

  jing:'问路，你答：「{a}」。路不必直，山水画里能走通的路，都是绕出来的。',
  wu:'问雾，你答：「{a}」。雾起时记得：雾是天气，不是山。',
  shui:'问水，你答：「{a}」。水自会往滋养你的方向流，不必逆着推它。',
  shan:'问山，你答：「{a}」。此为你之远山，风吹不动。',
  ting:'问亭，你答：「{a}」。画要留白才透气，日子也是。',
  ren:'问身，你答：「{a}」。静水之下有火，不必藏尽。',
  zhou:'问舟，你答：「{a}」。同船者不须多，共渡即可。'
};

var VQ = {
  jing:{q:'这条径，在你脚下是什么模样？', opts:[['a','迂回曲径'],['b','层层石阶'],['c','遇水搭桥']]},
  wu:{q:'此刻胸中的云气，像哪一种？', opts:[['a','平霭漫漫'],['b','浓云翻涌'],['c','轻烟将散']]},
  shui:{q:'你的水，是怎样流的？', opts:[['a','静水深流'],['b','溪涧奔涌'],['c','飞瀑直下']]},
  shan:{q:'你心里那座山，是什么形状？', opts:[['a','层峦叠嶂'],['b','孤峰独立'],['c','平远绵延']]},
  ting:{q:'歇脚之处，你想要哪一种？', opts:[['a','一座空亭'],['b','一间茅庐'],['c','一方石台']]},
  ren:{q:'画中的你，此刻正——', opts:[['a','拄杖徐行'],['b','坐看云起'],['c','振衣疾行']]},
  zhou:{q:'你的舟上，是何光景？', opts:[['a','扬帆待发'],['b','两人对坐'],['c','野渡空舟']]}
};
function variantOf(dim){ return (S.choices && S.choices[dim]) || 'a'; }
function variantName(dim){
  var k = variantOf(dim), opts = VQ[dim] ? VQ[dim].opts : [];
  for(var i=0;i<opts.length;i++){ if(opts[i][0]===k) return opts[i][1]; }
  return '';
}
function applyVariant(dim, animate){
  var g = document.getElementById('g-'+dim);
  if(!g) return;
  var k = variantOf(dim);
  var kids = g.children;
  for(var i=0;i<kids.length;i++){
    var el = kids[i];
    if(!el.classList || !el.classList.contains('v')) continue;
    var on = el.classList.contains('v-'+k);
    el.style.display = on ? '' : 'none';
    if(on && animate){
      el.classList.add('bloom');
      (function(e){ setTimeout(function(){ e.classList.remove('bloom'); }, 2400); })(el);
      drawOn(el, 'path, line');
    }
  }
}
function applyChoices(){ for(var d in DIMS) applyVariant(d, false); }
function pickVariant(dim, k){
  if(!S.choices) S.choices = {};
  S.choices[dim] = k; save();
  applyVariant(dim, true);
  inkDrop(dim);
  var row = document.getElementById('vq-chips');
  if(row){
    var bs = row.querySelectorAll('button');
    for(var i=0;i<bs.length;i++) bs[i].classList.toggle('on', bs[i].getAttribute('data-k')===k);
  }
}

var KEY = 'xinxiang-v1';
var S = load() || {hao:'', pending:null, skipped:[], answers:{}, phase:'start', choices:{}};

function load(){
  try{ var raw = localStorage.getItem(KEY); return raw ? JSON.parse(raw) : null; }
  catch(e){ return null; }
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){} }

function stageOf(dim){
  var n = 0;
  for(var i=0;i<Q.length;i++){ if(Q[i].dim===dim && S.answers[i]) n++; }
  return Math.min(n,2);
}
function richLen(dim){
  var n = 0;
  for(var i=0;i<Q.length;i++){ if(Q[i].dim===dim && S.answers[i]) n += S.answers[i].length; }
  return n;
}

var RICH_AT = 8;
function inkOpacity(d){
  var st = stageOf(d);
  if(st===0) return 0.22;
  var f = Math.min(1, richLen(d)/20);
  return Math.min(1, 0.68 + 0.27*f + (st===2 ? 0.10 : 0));
}
var prevStages = null, prevRich = {};
function paint(){
  var first = !prevStages;
  if(first){ prevStages = {}; }
  for(var d in DIMS){
    var st = stageOf(d);
    var g = document.getElementById('g-'+d);
    var was = first ? st : prevStages[d];
    g.setAttribute('class','dim-g st'+st + (st>was ? ' bloom' : ''));
    g.style.opacity = st===0 ? '' : String(inkOpacity(d));
    if(st>was){
      (function(gg){ setTimeout(function(){ gg.classList.remove('bloom'); }, 2000); })(g);
      if(st>=1) drawOn(g);
    }
    prevStages[d] = st;
    var rgs = g.querySelectorAll('.rich');
    if(rgs.length){
      var rich = st===2 || (st>0 && richLen(d)>=RICH_AT);
      for(var ri=0;ri<rgs.length;ri++){
        rgs[ri].setAttribute('class','rich' + (rich ? ' shown' : ''));
        if(rich && !prevRich[d] && !first) drawOn(rgs[ri], 'path, line');
      }
      prevRich[d] = rich;
    }
  }
}

function drawOn(g, sel){
  var els = g.querySelectorAll(sel || '.ink-line, .detail path, .detail line');
  for(var i=0;i<els.length;i++){
    (function(el){
      if(el.getAttribute('stroke-dasharray')) return;
      if(!el.getTotalLength) return;
      var L; try{ L = el.getTotalLength(); }catch(e){ return; }
      if(!L) return;
      el.style.transition = 'none';
      el.style.strokeDasharray = L + ' ' + L;
      el.style.strokeDashoffset = L;
      el.getBoundingClientRect();
      el.style.transition = 'stroke-dashoffset 1.8s ease';
      el.style.strokeDashoffset = '0';
      setTimeout(function(){
        el.style.transition = ''; el.style.strokeDasharray = ''; el.style.strokeDashoffset = '';
      }, 2100);
    })(els[i]);
  }
}

var INK_POINT = {jing:[240,405], wu:[450,270], shui:[650,450], shan:[210,190], ting:[378,336], ren:[205,412], zhou:[620,414]};
function inkDrop(dim){
  var svg = document.getElementById('scene');
  var p = INK_POINT[dim]; if(!p) return;
  var c = document.createElementNS('http://www.w3.org/2000/svg','circle');
  c.setAttribute('cx',p[0]); c.setAttribute('cy',p[1]); c.setAttribute('r','2');
  c.setAttribute('fill','none'); c.setAttribute('stroke','#39423e');
  c.setAttribute('stroke-width','1.5'); c.setAttribute('opacity','0.5');
  svg.appendChild(c);
  var t0 = null;
  function tick(ts){
    if(t0===null) t0 = ts;
    var k = (ts - t0) / 900;
    if(k >= 1){ svg.removeChild(c); return; }
    c.setAttribute('r', String(2 + k*26));
    c.setAttribute('opacity', String(0.5*(1-k)));
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
function answeredCount(){ var n=0; for(var k in S.answers) n++; return n; }
function hasProgress(){
  return answeredCount()>0 || (S.pending && S.pending.length>0 && S.pending.length<Q.length) || S.skipped.length>0;
}

var panel = document.getElementById('panel');
function show(html){
  panel.classList.add('out');
  setTimeout(function(){ panel.innerHTML = html; panel.classList.remove('out'); }, 320);
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderStart(){
  S.phase = 'start'; save();
  show(
    '<h1 class="title">心象山水</h1>' +
    '<p class="sub">一次纸上的徒步——以问作杖，以答为墨</p>' +
    '<p class="hint">整卷共十四问，皆可略过。每答一问，画上便着一次墨：' +
    '山是你的信念，雾是你的情绪，水是你的能量，径是你的方向，亭是你的空，行人是你的身体，舟是你的同行者。' +
    '墨随言深——你在哪一处写得越多，那一处的山水便越深。遇到点选之问，选哪一笔，画里便是哪一笔——每个人的山水，各不相同。答案只存在你自己的浏览器里，不会被上传。</p>' +
    '<div><input type="text" id="hao" maxlength="4" placeholder="给自己起个号，将刻作印" value="' + esc(S.hao) + '"></div>' +
    '<div class="btns"><button class="primary" onclick="begin()">入 山</button>' +
    (hasProgress() ? '<button onclick="resume()">续 画</button>' : '') +
    '</div>'
  );
}

function begin(){
  if(hasProgress() && !confirm('重新入山会抹去上一卷的笔墨。要续画请选「续画」，确定重新开始吗？')) return;
  var hao = document.getElementById('hao').value.trim();
  S.hao = hao || '无名';
  S.pending = []; S.skipped = []; S.answers = {}; S.choices = {};
  for(var i=0;i<Q.length;i++) S.pending.push(i);
  S.phase = 'walk'; save(); applyChoices(); paint();
  step();
}
function resume(){
  var hao = document.getElementById('hao');
  if(hao && hao.value.trim()) S.hao = hao.value.trim();
  if(!S.pending || (S.pending.length===0 && S.skipped.length===0)){ finish(); return; }
  if(S.pending.length===0){ S.pending = S.skipped; S.skipped = []; }
  S.phase='walk'; save(); step();
}

function vqBlock(dim){
  var vq = VQ[dim];
  if(!vq || (S.choices && S.choices[dim])) return '';
  var chips = '';
  for(var c=0;c<vq.opts.length;c++){

function step(){
  if(!S.pending || S.pending.length===0){ finish(); return; }

function inkDown(i){
  var t = document.getElementById('ans');
  var v = t ? t.value.trim() : '';
  if(!v){
    document.getElementById('warn').textContent = '落笔需着墨——写一点什么，或选择略过。';
    return;
  }
  S.answers[i] = v;
  S.pending.shift();
  save(); inkDrop(Q[i].dim); paint();
  step();
}
function skip(i){
  S.skipped.push(i);
  S.pending.shift();
  save();
  step();
}

function ganzhi(){
  var y = new Date().getFullYear();
  var tg = '甲乙丙丁戊己庚辛壬癸', dz = '子丑寅卯辰巳午未申酉戌亥';
  return tg[(y-4)%10] + dz[(y-4)%12];
}
function seasonWord(){
  var m = new Date().getMonth()+1;
  if(m>=3&&m<=5) return '春'; if(m>=6&&m<=8) return '夏';
  if(m>=9&&m<=11) return '秋'; return '冬';
}

function truncate(s, n){
  s = s.replace(/\s+/g,' ');
  return s.length > n ? s.slice(0,n) + '……' : s;
}

function buildZhi(){
  var order = ['jing','wu','shui','shan','ting','ren','zhou'];
  var lines = [];
  lines.push(ganzhi() + '年' + seasonWord() + '，' + S.hao + '以十四问入山，得此卷。');
  lines.push('');
  for(var d=0; d<order.length; d++){
    var dim = order[d];
    var first = null;
    for(var i=0;i<Q.length;i++){
      if(Q[i].dim===dim && S.answers[i]){ first = S.answers[i]; break; }
    }
    if(first){
      lines.push(ZHI_LINES[dim].replace('{a}', truncate(first, 56)));
    }
  }
  lines.push('');
  lines.push('山水不在远处，行走即是抵达。');
  return lines.join('\n');
}

function finish(){
  S.phase = 'done'; save(); paint();

  document.getElementById('seal-text').textContent = sealChar;

  document.getElementById('g-tiba').classList.add('shown');
  document.getElementById('g-seal').classList.add('shown');

function copyText(text, okMsg){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){ note(okMsg); }, function(){ fallbackCopy(text, okMsg); });
  } else { fallbackCopy(text, okMsg); }
}
function fallbackCopy(text, okMsg){

}

var RESONANCE = {
  jing:'你们走的路，有一段是重叠的。',
  wu:'你们的雾，说着相近的话。',
  shui:'你们的水，往相近的方向流。',

  ting:'你们在同一座亭里歇过脚。',
  ren:'你们身体里，住着同一种火。',
  zhou:'你们都认得那种同船的感觉。'
};

function h2(s){
  var h = 5381;
  for(var i=0;i<s.length;i++){ h = ((h<<5)+h+s.charCodeAt(i))>>>0; }
  return h % 1048576;
}
function bigramHashes(dim){
  var s = '';
  for(var i=0;i<Q.length;i++){ if(Q[i].dim===dim && S.answers[i]) s += S.answers[i]; }
  s = s.toLowerCase().replace(/[\s，。！？、；：,.!?…—「」『』()（）:;'"“”‘’-]/g,'');
  var seen = {}, out = [];
  for(var i=0;i<s.length-1;i++){
    var b = s.slice(i,i+2);
    if(!seen[b]){ seen[b]=1; out.push(h2(b)); if(out.length>=60) break; }
  }
  return out;
}
function tagData(){
  var d = {};
  for(var k=0;k<ORDER.length;k++){
    var dim = ORDER[k];
    d[dim] = {l:richLen(dim), b:bigramHashes(dim)};
  }
  return {v:1, h:S.hao, d:d};
}
function makeTag(deep){
  var data = tagData();
  if(deep){
    data.deep = true;
    var r = {};
    for(var i=0;i<Q.length;i++){ if(S.answers[i]) r[i] = S.answers[i]; }
    data.r = r;
  }
  return btoa(unescape(encodeURIComponent(JSON.stringify(data))));
}
function copyTag(){ copyText(makeTag(false), '隐私分享码已复制——对方看不到你写的任何内容，可以放心发'); }
function copyDeepTag(){ copyText(makeTag(true), '完整分享码已复制（包含你写的全文）——只发给你信任的人'); }

function duidu(){
  var out = document.getElementById('duidu-out');
  var raw = document.getElementById('tag-in').value.trim();
  if(!raw){ out.textContent = '先把朋友的分享码粘进来。'; return; }
  var theirs = null;
  try{ theirs = JSON.parse(decodeURIComponent(escape(atob(raw)))); }catch(e){}
  if(!theirs || theirs.v!==1 || !theirs.d){ out.textContent = '这个分享码读不出来——请朋友确认复制完整。'; return; }
  lastTheirs = theirs;
  var aiRow = document.getElementById('ai-row');
  if(aiRow) aiRow.style.display = (theirs.r && typeof theirs.r === 'object') ? 'flex' : 'none';
  var mine = tagData();
  var friend = String(theirs.h||'友人').slice(0,8);
  var lines = [mine.h + ' 与 ' + friend + '，两卷对读：',''];
  function deepest(t){
    var best = null, bl = 0;
    for(var k=0;k<ORDER.length;k++){
      var dm = ORDER[k];
      var l = (t.d[dm] && t.d[dm].l) || 0;
      if(l > bl){ bl = l; best = dm; }
    }
    return best;
  }
  var md = deepest(mine), td = deepest(theirs);
  if(md && td){
    lines.push(md===td
      ? '你们都把最深的墨，给了「' + DIMS[md].name + '」。'
      : '你把最深的墨给了「' + DIMS[md].name + '」，ta 给了「' + DIMS[td].name + '」——正好互为风景。');
    lines.push('');
  }
  var n = 0;
  for(var k=0;k<ORDER.length;k++){
    var dm = ORDER[k];
    var a = (mine.d[dm] && mine.d[dm].b) || [];
    var b = (theirs.d[dm] && theirs.d[dm].b) || [];
    if(!a.length || !b.length) continue;
    var setB = {};
    for(var j=0;j<b.length;j++) setB[b[j]] = 1;
    var inter = 0;
    for(var j=0;j<a.length;j++) if(setB[a[j]]) inter++;
    if(inter >= 1){ n++; lines.push(RESONANCE[dm]); }
  }
  lines.push('');
  lines.push(n>0
    ? '两卷共有 ' + n + ' 处相通。相通之处，即是渡口。'
    : '这一读，字句上未见相通——两座山隔水相望，也是一种相逢。');
  if(theirs.r && typeof theirs.r === 'object'){
    lines.push('');
    lines.push('（对方发来的是完整分享码，包含 ta 写的全文——可以复制下方给AI分析，请 AI 深读两卷真正的共鸣。）');
  } else {
    lines.push('');
    lines.push('（对方的分享码不含内容，看不出更深的共鸣。若想深读，请 ta 改发「带内容」的分享码。）');
  }
  out.textContent = lines.join('\n');
}

function exportPNG(){
  var svg = document.getElementById('scene');
  var clone = svg.cloneNode(true);
  clone.setAttribute('width','1800'); clone.setAttribute('height','1040');
  for(var d in DIMS){
    var st = stageOf(d);
    var g = clone.querySelector('#g-'+d);
    g.setAttribute('opacity', st===0 ? '0.13' : String(inkOpacity(d)));
    var dets = g.querySelectorAll('.detail');
    for(var di=0;di<dets.length;di++){ dets[di].setAttribute('opacity', st===2 ? '1' : '0'); }
    var liveRich = document.getElementById('g-'+d).querySelectorAll('.rich');
    var cloneRich = g.querySelectorAll('.rich');
    for(var ri=0;ri<cloneRich.length;ri++){
      var shownR = liveRich[ri] && liveRich[ri].classList.contains('shown');
      cloneRich[ri].setAttribute('opacity', shownR ? '1' : '0');
    }
  }
  ['g-tiba','g-seal'].forEach(function(id){
    var shown = document.getElementById(id).classList.contains('shown');
    clone.querySelector('#'+id).setAttribute('opacity', shown ? '1' : '0');
  });
  var data = new XMLSerializer().serializeToString(clone);
  var b64 = btoa(unescape(encodeURIComponent(data)));
  var img = new Image();
  img.onload = function(){
    var c = document.createElement('canvas');
    c.width = 1800; c.height = 1040;
    var ctx = c.getContext('2d');
    ctx.fillStyle = '#f5f1e6'; ctx.fillRect(0,0,1800,1040);
    ctx.drawImage(img,0,0,1800,1040);
    var a = document.createElement('a');
    a.download = '心象山水 · ' + S.hao + '.png';
    a.href = c.toDataURL('image/png');
    a.click();
    note('画卷已导出');
  };
  img.onerror = function(){ note('导出失败，请截图保存'); };
  img.src = 'data:image/svg+xml;base64,' + b64;
}

    '<circle cx="30" cy="-16" r="1.3" fill="#a63d2a" opacity=".7"/>'; },
  yue: function(){ return '<circle cx="0" cy="0" r="14" fill="#eee9da" stroke="#c9c2ad" stroke-width="1"/>' +
    '<circle cx="0" cy="0" r="19" fill="none" stroke="#d8d2c0" stroke-width="3" opacity=".35"/>'; },
  ta: function(){ return '<path d="M-12 24 L12 24 M-10 24 L-10 14 M10 24 L10 14 M-13 14 L13 14 M-8 14 L-8 5 M8 14 L8 5 M-11 5 L11 5 M-6 5 L-6 -3 M6 5 L6 -3 M-9 -3 L9 -3 M-4 -3 L-4 -10 M4 -3 L4 -10 M-7 -10 L7 -10 M0 -10 L0 -20 M0 -20 l0 -6" stroke="#55645d" stroke-width="1.3" fill="none"/>'; },
  shi: function(){ return '<path d="M-16 8 C-14 -2 -4 -8 4 -4 C12 -8 20 -2 18 6 C22 12 14 18 4 16 C-6 20 -16 16 -16 8 Z" fill="#7f9186" opacity=".85"/>' +
    '<path d="M-8 4 q8 -6 16 -4" stroke="#4e5c56" stroke-width=".9" fill="none" opacity=".6"/>'; },
  wu2: function(){ return '<path d="M-18 2 L0 -12 L18 2" stroke="#55645d" stroke-width="1.6" fill="none"/>' +
    '<path d="M-14 2 L-14 14 M14 2 L14 14 M-16 14 L16 14" stroke="#55645d" stroke-width="1.3" fill="none"/>' +
    '<path d="M-20 2 L20 2" stroke="#55645d" stroke-width="1.2"/>' +
    '<path d="M-3 14 L-3 6 L4 6 L4 14" stroke="#55645d" stroke-width="1" fill="none"/>'; },
  yu: function(){ return '<path d="M-8 0 q8 -12 20 -8 q-2 8 -12 10 q-6 3 -8 -2 Z" fill="#55645d" opacity=".8"/>' +
    '<circle cx="16" cy="6" r="1.2" fill="#8aa098"/>' +
    '<path d="M-14 10 q14 5 30 2" stroke="#8aa098" stroke-width="1" fill="none" opacity=".7"/>'; },
  zi: function(m){ return '<text font-size="15" fill="#4a5350" style="writing-mode:vertical-rl; letter-spacing:4px;">' + esc(m.tx||'') + '</text>'; }
};

var studioMode = null, placeKind = null;

function ensureMarksGroup(){
  var svg = document.getElementById('scene');
  var gm = document.getElementById('g-marks');
  if(!gm){
    gm = document.createElementNS(SVGNS,'g');
    gm.setAttribute('id','g-marks');
    svg.insertBefore(gm, document.getElementById('g-tiba'));
  }
  return gm;
}
function assignEids(){
  var groups = ['g-shan','g-wu','g-shui','g-jing','g-decor','g-ting','g-ren','g-zhou'];
  for(var i=0;i<groups.length;i++){
    var g = document.getElementById(groups[i]);
    if(!g) continue;
    var els = g.querySelectorAll('path, line, circle, ellipse');
    for(var j=0;j<els.length;j++){ els[j].setAttribute('data-eid', groups[i]+'/'+j); }
  }
}
function refEl(ref){
  if(ref.indexOf('mark:')===0) return document.querySelector('[data-mark="'+ref.slice(5)+'"]');
  return document.querySelector('[data-eid="'+ref+'"]');
}
function createMark(m, animate){
  var gm = ensureMarksGroup();
  var g = document.createElementNS(SVGNS,'g');
  g.setAttribute('data-mark', m.id);
  g.setAttribute('transform','translate('+m.x+' '+m.y+') scale('+(m.s||1)+')');
  if(!IS_MOBILE) g.setAttribute('filter','url(#brush)');
  var inner = document.createElementNS(SVGNS,'g');
  inner.setAttribute('class','mk mark-'+m.k);
  inner.innerHTML = MARK_TPL[m.k](m);
  g.appendChild(inner);
  gm.appendChild(g);
  if(animate){
    g.style.opacity = '0';
    g.getBoundingClientRect();
    g.style.transition = 'opacity 1.4s ease';
    g.style.opacity = '1';
    drawOn(g, 'path, line');
    inkDropXY(m.x, m.y);
  }
  return g;
}
function applyMarks(){
  if(!S.marks) return;
  for(var i=0;i<S.marks.length;i++){
    var m = S.marks[i];
    if(m.t==='add'){ createMark(m, false); }
    else if(m.t==='hide'){ var el = refEl(m.eid); if(el) el.style.display='none'; }
  }
}
function inkDropXY(x, y){
  var svg = document.getElementById('scene');
  var c = document.createElementNS(SVGNS,'circle');
  c.setAttribute('cx',x); c.setAttribute('cy',y); c.setAttribute('r','2');
  c.setAttribute('fill','none'); c.setAttribute('stroke','#39423e');
  c.setAttribute('stroke-width','1.5'); c.setAttribute('opacity','0.5');
  svg.appendChild(c);
  var t0 = null;
  function tick(ts){
    if(t0===null) t0 = ts;
    var k = (ts - t0) / 900;
    if(k >= 1){ svg.removeChild(c); return; }
    c.setAttribute('r', String(2 + k*26));
    c.setAttribute('opacity', String(0.5*(1-k)));
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function studioNote(msg){
  var el = document.getElementById('studio-note');
  if(el) el.textContent = msg || '';
}
function renderStudio(){
  studioMode = null; placeKind = null;
  var chips = '';
  for(var i=0;i<KINDS.length;i++){
    chips += '<button id="chip-'+KINDS[i].k+'" onclick="pickKind(\''+KINDS[i].k+'\')">'+KINDS[i].n+'</button>';
  }
  var skippedLeft = S.skipped.length;
  show(
    '<p class="end-title">画 意</p>' +
    '<p class="hint">这幅画现在交给你。想添什么，先点一个物象，再在画上点一处落笔；' +
    '点「擦一笔」后，再点画里任何一笔，就能擦去它；不满意就「取消上一笔」。你添的每一笔都会存进画卷，导出时原样带上。</p>' +
    '<div class="btns chips">' + chips + '</div>' +
    '<div id="zi-row" style="display:none; margin-top:12px;"><input type="text" id="zi-text" maxlength="12" placeholder="想题在画上的字（12字内）"></div>' +
    '<div class="btns">' +
    '<button id="erase-btn" onclick="toggleErase()">擦一笔</button>' +
    '<button onclick="undoMark()">取消上一笔</button>' +
    '<button id="alive-btn" onclick="toggleAlive()">' + (S.alive?'静下来':'动起来') + '</button>' +
    '<button onclick="exportPNG()">导出画卷</button>' +
    '</div>' +
    '<div class="btns">' +
    '<button onclick="copyPrompt()">复制这段文字去见AI</button>' +
    '<button onclick="duiduView()">两卷对读</button>' +
    (skippedLeft>0 ? '<button onclick="reAnswer()">补答略过的 ' + skippedLeft + ' 问</button>' : '') +
    '<button class="quiet" onclick="restart()">重新入山</button>' +
    '<button class="quiet" onclick="exitStudio()">回到成卷</button>' +
    '</div>' +
    '<p class="warn" id="studio-note"></p>' +
    '<p class="save-note" id="copy-note"></p>'
  );
}
function clearChipActive(){
  for(var i=0;i<KINDS.length;i++){
    var b = document.getElementById('chip-'+KINDS[i].k);
    if(b) b.classList.remove('on');
  }
}
function pickKind(k){
  var svg = document.getElementById('scene');
  if(studioMode==='erase') toggleErase();
  studioMode = 'place'; placeKind = k;
  clearChipActive();
  var b = document.getElementById('chip-'+k);
  if(b) b.classList.add('on');
  svg.classList.add('placing');
  var ziRow = document.getElementById('zi-row');
  if(ziRow) ziRow.style.display = (k==='zi') ? 'block' : 'none';
  if(k==='zi'){
    studioNote('先写下想题的字，再在画上点一处落款。');
    setTimeout(function(){ var t=document.getElementById('zi-text'); if(t) t.focus(); }, 50);
  } else {
    studioNote('好——在画上点一处落笔。');
  }
}
function toggleErase(){
  var svg = document.getElementById('scene');
  var b = document.getElementById('erase-btn');
  if(studioMode==='erase'){
    studioMode = null;
    svg.classList.remove('erasing');
    if(b) b.classList.remove('on');
    studioNote('');
  } else {
    studioMode = 'erase'; placeKind = null;
    clearChipActive();
    svg.classList.remove('placing');
    svg.classList.add('erasing');
    var ziRow = document.getElementById('zi-row');
    if(ziRow) ziRow.style.display = 'none';
    if(b) b.classList.add('on');
    studioNote('点画中任何一笔，擦去它。再点「擦一笔」退出。');
  }
}
function exitPlaceMode(){
  var svg = document.getElementById('scene');
  studioMode = null; placeKind = null;
  svg.classList.remove('placing');
  clearChipActive();
}
function undoMark(){
  if(!S.marks || S.marks.length===0){ studioNote('没有可取消的笔了。'); return; }
  var last = S.marks.pop();
  if(last.t==='add'){
    var el = document.querySelector('[data-mark="'+last.id+'"]');
    if(el && el.parentNode) el.parentNode.removeChild(el);
  } else if(last.t==='hide'){
    var el2 = refEl(last.eid);
    if(el2) el2.style.display = '';
  }
  save();
  studioNote('已取消上一笔。');
}
function toggleAlive(){
  S.alive = !S.alive; save();
  document.getElementById('scene').classList.toggle('alive', S.alive);
  var b = document.getElementById('alive-btn');
  if(b) b.textContent = S.alive ? '静下来' : '动起来';
}
function exitStudio(){
  var svg = document.getElementById('scene');
  studioMode = null; placeKind = null;
  svg.classList.remove('placing'); svg.classList.remove('erasing');
  finish();
}

function svgPoint(e){
  var svg = document.getElementById('scene');
  var r = svg.getBoundingClientRect();
  return { x: (e.clientX - r.left) * 900 / r.width, y: (e.clientY - r.top) * 520 / r.height };
}
function findEraseTarget(e){
  var t = e.target.closest ? e.target.closest('[data-mark]') : null;
  if(t) return t;
  t = e.target.closest ? e.target.closest('[data-eid]') : null;
  if(t) return t;
  var svg = document.getElementById('scene');
  var cands = svg.querySelectorAll('[data-eid], [data-mark]');
  var best = null, bd = 26;
  for(var i=0;i<cands.length;i++){
    var el = cands[i];
    if(el.style.display==='none') continue;
    var b;
    try{ b = el.getBoundingClientRect(); }catch(err){ continue; }
    if(!b.width && !b.height) continue;
    var cx = b.left + b.width/2, cy = b.top + b.height/2;
    var d = Math.max(Math.abs(e.clientX-cx) - b.width/2, Math.abs(e.clientY-cy) - b.height/2);
    if(d < bd){ bd = d; best = el; }
  }
  return best;
}
function sceneClick(e){
  if(studioMode==='place' && placeKind){
    var p = svgPoint(e);
    var m = { t:'add', k:placeKind, x:Math.round(p.x), y:Math.round(p.y),
              s:+(0.85 + Math.random()*0.4).toFixed(2), id:'m'+Date.now() };
    if(placeKind==='zi'){
      var t = document.getElementById('zi-text');
      var tx = t ? t.value.trim() : '';
      if(!tx){ studioNote('先写下想题的字。'); return; }
      m.tx = tx; m.s = 1;
    }
    S.marks.push(m); save();
    createMark(m, true);
    exitPlaceMode();
    studioNote('已落笔。可继续添别的，或「取消上一笔」。');
  } else if(studioMode==='erase'){
    var el = findEraseTarget(e);
    if(!el){ studioNote('这里没有笔墨——点画中有东西的地方。'); return; }
    var ref = el.hasAttribute('data-mark') ? 'mark:'+el.getAttribute('data-mark') : el.getAttribute('data-eid');
    el.style.display = 'none';
    S.marks.push({ t:'hide', eid:ref }); save();
    studioNote('擦去一笔。');
  }
}

document.getElementById('paper').classList.add('shown');
if(!S.marks) S.marks = [];
if(!S.choices) S.choices = {};
if(typeof S.alive === 'undefined') S.alive = false;
assignEids();
ensureMarksGroup();
applyChoices();
applyMarks();
if(S.alive) document.getElementById('scene').classList.add('alive');
document.getElementById('scene').addEventListener('click', sceneClick);
paint();
if(S.phase === 'walk' && S.pending && (S.pending.length>0 || S.skipped.length>0)){
  if(S.pending.length===0){ S.pending=S.skipped; S.skipped=[]; }
  step();
} else if(S.phase === 'done'){
  finish();
} else {
  renderStart();
}
</script>
</body>
